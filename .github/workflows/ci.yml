name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build, vet, fmt, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: burrow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Runs the controlplane/postgres integration tests against the service container
      # above instead of skipping them (ADR-0012: in-cluster Postgres, tested for real).
      BURROW_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/burrow_test?sslmode=disable
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { echo "gofmt needed:"; gofmt -l .; exit 1; }
      - name: go vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test ./...

  license:
    name: SPDX license headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: check SPDX headers
        run: bash scripts/check-spdx.sh

  kube-integration:
    name: kubernetes integration (k3d)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: install k3d
        run: curl -sfL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
      - name: create cluster
        run: k3d cluster create burrow-ci --wait --timeout 120s
      - name: preload test image
        run: |
          docker pull busybox:1.36
          k3d image import busybox:1.36 -c burrow-ci
      - name: run the kube integration test against k3d
        run: |
          KCFG=$(k3d kubeconfig write burrow-ci)
          BURROW_TEST_KUBECONFIG="$KCFG" go test ./controlplane/kube/ -run TestIntegration -v -timeout 280s
      - name: delete cluster
        if: always()
        run: k3d cluster delete burrow-ci
