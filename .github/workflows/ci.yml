name: CI

on:
  push:
    branches: [main]
  pull_request:
  # merge_group runs the required checks against the queued PR merged onto main, so the
  # merge queue tests the actual merge result (not just the PR branch in isolation).
  # Without this trigger an enabled queue stalls — its required checks never run.
  merge_group:

jobs:
  # changes detects whether anything other than documentation changed, so the heavy build
  # and integration jobs can be skipped on docs-only PRs. A skipped required check still
  # counts as passing for branch protection and the merge queue, so auto-merge keeps working.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'

  build:
    name: build, vet, fmt, test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: burrow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Runs the controlplane/postgres integration tests against the service container
      # above instead of skipping them (ADR-0012: in-cluster Postgres, tested for real).
      BURROW_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/burrow_test?sslmode=disable
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { echo "gofmt needed:"; gofmt -l .; exit 1; }
      - name: go vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test ./...

  license:
    name: SPDX license headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: check SPDX headers
        run: bash scripts/check-spdx.sh

  kube-integration:
    name: kubernetes integration (k3d)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: install k3d
        run: curl -sfL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
      - name: create cluster
        run: k3d cluster create burrow-ci --wait --timeout 120s
      - name: preload test images
        run: |
          for img in busybox:1.36 busybox:1.37 mendhak/http-https-echo:31 nginx:alpine nginx:1.27-alpine; do
            docker pull "$img"
            k3d image import "$img" -c burrow-ci
          done
      - name: run the kube, engine e2e, and connect proxy tests against k3d
        run: |
          KCFG=$(k3d kubeconfig write burrow-ci)
          export BURROW_TEST_KUBECONFIG="$KCFG"
          # `k3d cluster create --wait` reports the server up, but the k3d load-balancer
          # port mapping the written kubeconfig points at can still EOF the first request
          # before it is actually forwarding. Block until the API answers so a cold start
          # does not fail the first test (the intermittent "create namespace: ... EOF").
          for i in $(seq 1 30); do
            if kubectl --kubeconfig "$KCFG" get --raw=/readyz >/dev/null 2>&1; then
              echo "k3d API server is ready"
              break
            fi
            echo "waiting for the k3d API server to answer ($i)..."
            sleep 2
          done
          kubectl --kubeconfig "$KCFG" get --raw=/readyz
          go test ./controlplane/kube/ -run TestIntegration -v -timeout 280s
          go test ./controlplane/e2e/ -v -timeout 300s
          go test ./connect/ -run TestProxyForwardsCustomHeader -v -timeout 300s
      - name: capstone e2e (install + deploy through the CLI)
        run: bash test/e2e/install-and-deploy.sh
        env:
          K3D_CLUSTER: burrow-ci
      - name: delete cluster
        if: always()
        run: k3d cluster delete burrow-ci
