name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build, vet, fmt, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { echo "gofmt needed:"; gofmt -l .; exit 1; }
      - name: go vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test ./...

  license:
    name: SPDX license headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: check SPDX headers
        run: bash scripts/check-spdx.sh
