name: CI

on:
  push:
    branches: [main]
  pull_request:
  # merge_group runs the required checks against the queued PR merged onto main, so the
  # merge queue tests the actual merge result (not just the PR branch in isolation).
  # Without this trigger an enabled queue stalls — its required checks never run.
  merge_group:

jobs:
  # changes detects whether anything other than documentation changed, so the heavy build
  # and integration jobs can be skipped on docs-only PRs. A skipped required check still
  # counts as passing for branch protection and the merge queue, so auto-merge keeps working.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'

  build:
    name: build, vet, fmt, test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: burrow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Runs the controlplane/postgres integration tests against the service container
      # above instead of skipping them (ADR-0012: in-cluster Postgres, tested for real).
      BURROW_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/burrow_test?sslmode=disable
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { echo "gofmt needed:"; gofmt -l .; exit 1; }
      - name: go vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test ./...

  license:
    name: SPDX license headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: check SPDX headers
        run: bash scripts/check-spdx.sh

  kube-integration:
    name: kubernetes integration (k3d)
    needs: changes
    # Run the heavy (~9 min) integration job only in the merge queue, not on every PR push. The
    # merge_group run tests the actual merged-onto-main result, so also running it on the PR branch
    # just doubles the wait (PR run, then queue run). A skipped required check still counts as
    # passing for branch protection and the queue (same as the docs-only skip above), so PRs stay
    # green on the fast checks and this gate runs once, at merge.
    if: needs.changes.outputs.code == 'true' && github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    # Make the `go test` steps compile with the same flags ko uses for the burrowd build, so ko
    # reuses the client-go objects the tests already compiled instead of a cold recompile. ko
    # builds static (CGO off) and with -trimpath by default; CI's go test would otherwise default
    # to CGO on and no -trimpath, giving every package a different build-cache key.
    env:
      CGO_ENABLED: "0"
      GOFLAGS: "-trimpath"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          # Manage the build cache explicitly below: setup-go keys only on go.sum (not the build
          # flags) and never re-saves on an exact key hit, so it would restore a stale cache built
          # with this job's old flags and recompile client-go cold every run.
          cache: false
      # ko builds the burrowd image for the capstone e2e from the host Go cache (warm from the
      # test runs in this job), instead of recompiling inside a docker build.
      - uses: ko-build/setup-ko@v0.8
      # Cache compiled packages + modules across runs so the test compiles (and ko, which reuses
      # them) are warm. Keyed on go.sum and scoped to this job, whose flags are constant — so the
      # client-go objects stay cached; only Burrow's own (changed) packages recompile each run.
      - name: cache go build + module caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: gocache-kube-${{ runner.os }}-go1.26-${{ hashFiles('go.sum') }}
          restore-keys: |
            gocache-kube-${{ runner.os }}-go1.26-
      - name: install k3d
        run: curl -sfL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
      - name: create cluster
        run: k3d cluster create burrow-ci --wait --timeout 120s
      - name: preload test images
        run: |
          images="busybox:1.36 busybox:1.37 mendhak/http-https-echo:31 nginx:alpine nginx:1.27-alpine victoriametrics/victoria-logs:v1.51.0 victoriametrics/victoria-metrics:v1.115.0 victoriametrics/vmagent:v1.115.0 fluent/fluent-bit:3.2.10 grafana/loki:3.2.1 prom/prometheus:v3.1.0 valkey/valkey:8.0 postgres:17-alpine curlimages/curl:8.11.1"
          # Pull in parallel (serial pulls dominated this step) with a short retry for transient
          # registry hiccups, then import them all into k3d in a single call.
          printf '%s\n' $images | xargs -P 8 -n1 sh -c '
            for attempt in 1 2 3; do
              docker pull "$1" && exit 0
              echo "retry $attempt: docker pull $1" >&2
              sleep 3
            done
            exit 1' _
          k3d image import $images -c burrow-ci
      - name: run the kube, engine e2e, and connect proxy tests against k3d
        run: |
          KCFG=$(k3d kubeconfig write burrow-ci)
          export BURROW_TEST_KUBECONFIG="$KCFG"
          # `k3d cluster create --wait` reports the server up, but the k3d load-balancer
          # port the written kubeconfig points at can still EOF the first real request before
          # it is actually forwarding — and /readyz can pass while a namespaced call still
          # drops (observed as the intermittent "create namespace: ... EOF" in the first test).
          # So block until a REAL API call (listing namespaces, the path the tests use)
          # succeeds, not just /readyz, with a generous budget for a cold runner.
          ready=
          for i in $(seq 1 45); do
            if kubectl --kubeconfig "$KCFG" get namespaces >/dev/null 2>&1; then
              echo "k3d API server is serving real requests"
              ready=1
              break
            fi
            echo "waiting for the k3d API server to serve ($i)..."
            sleep 2
          done
          if [ -z "$ready" ]; then
            echo "k3d API server never served a real request within the budget" >&2
            exit 1
          fi
          go test ./controlplane/kube/ -run TestIntegration -v -timeout 280s
          go test ./controlplane/e2e/ -v -timeout 300s
          go test ./connect/ -run TestProxyForwardsCustomHeader -v -timeout 300s
      - name: capstone e2e (install + deploy through the CLI)
        run: bash test/e2e/install-and-deploy.sh
        env:
          K3D_CLUSTER: burrow-ci
      # Pins the fast path of docs/QUICKSTART.md so the doc cannot rot: build + import the
      # examples/hello image, deploy it, confirm it runs, and assert `app delete` is HELD for
      # confirmation. Reuses the burrow-ci cluster above (K3D_CLUSTER), so it adds no second
      # cluster bring-up and leaves teardown to the delete step below.
      - name: quickstart e2e (the doc's fast path, ending in the delete guardrail)
        run: bash test/e2e/quickstart.sh
        env:
          K3D_CLUSTER: burrow-ci
      - name: delete cluster
        if: always()
        run: k3d cluster delete burrow-ci

  # pr-checks is the single aggregate gate, intended to be the ONLY required status check in branch
  # protection. It passes when every other job passed or was legitimately skipped (a docs-only change,
  # or the merge_group-only heavy job on a PR) and fails if any job failed or was cancelled. Requiring
  # just this one check keeps the per-job checks from showing as "skipped/expected" on a PR while still
  # gating the merge on their real results in the queue. Add new jobs to its `needs` to include them.
  pr-checks:
    name: PR checks
    needs: [changes, build, license, kube-integration]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: require every job to have passed or been skipped
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "upstream job results: $results"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::a required job result was '$r' — failing the PR checks gate"
              exit 1
            fi
          done
          echo "all upstream jobs passed or were legitimately skipped"
