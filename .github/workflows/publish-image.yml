name: Publish burrowd image

# Builds the burrowd control-plane image with ko (no Dockerfile) and pushes it to GHCR so a
# cluster (e.g. DigitalOcean) can pull it. Trigger it manually to publish a tag for testing,
# or it runs automatically on a v* git tag (the release flow).
#
# After the first publish, make the `burrowd` package public in the repo's GitHub Packages
# settings so the image can be pulled anonymously.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. v0.2.0)"
        required: true
        default: v0.2.0
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: build and push to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: ko-build/setup-ko@v0.8

      - name: resolve image tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: build and push
        # --bare publishes exactly $KO_DOCKER_REPO:<tag> (ghcr.io/<owner>/burrowd:<tag>); setup-ko
        # has already logged in to GHCR with the workflow token.
        run: ko build --bare --platform=linux/amd64 --tags "${{ steps.meta.outputs.tag }}" ./cmd/burrowd
        env:
          KO_DOCKER_REPO: ghcr.io/${{ github.repository_owner }}/burrowd

      - name: summary
        run: |
          echo "Published ghcr.io/${{ github.repository_owner }}/burrowd:${{ steps.meta.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "If this is the first publish, make the package public in GitHub > Packages so clusters can pull it anonymously." >> "$GITHUB_STEP_SUMMARY"
