# Task targets for Burrow (https://taskfile.dev). Run `task` to list them.
#
# Targets are split into LIGHT (safe to run anytime — pure Go, no Docker) and HEAVY
# (start a real Postgres or a k3d/Docker cluster). `task check` is the light pre-commit
# gate; the heavy integration targets must be invoked deliberately.
version: "3"

silent: true

vars:
  # Version stamped into from-source dev builds by dev-build / dev-image. A prerelease of the
  # next minor keeps it distinct from any released tag; override on the command line, e.g.
  # `task dev-build DEV_VERSION=v0.13.0-dev`.
  DEV_VERSION: v0.13.0-dev

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  # --- light targets (no Docker, safe anytime) ---

  build:
    desc: Build all packages and binaries
    cmds:
      - go build ./...

  fmt:
    desc: Format all Go code in place
    cmds:
      - gofmt -w .

  fmt:check:
    desc: Fail if any Go file needs gofmt
    cmds:
      - test -z "$(gofmt -l .)" || { echo "gofmt needed:"; gofmt -l .; exit 1; }

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  spdx:
    desc: Check per-directory SPDX license headers
    cmds:
      - bash scripts/check-spdx.sh

  test:
    desc: Run unit tests (integration tests skip unless their env vars are set)
    cmds:
      - go test ./...

  test:race:
    desc: Run tests under the race detector
    cmds:
      - go test -race ./...

  check:
    desc: Pre-commit gate — fmt, vet, build, unit tests, SPDX (all light, no Docker)
    cmds:
      - task: fmt:check
      - task: vet
      - task: build
      - task: test
      - task: spdx

  # --- dev-cluster builds (stamp a version the upgrade + skew gates accept) ---

  dev-build:
    desc: "DEV: install the burrow CLI stamped with DEV_VERSION so the skew gate accepts it (override DEV_VERSION=...)"
    cmds:
      # The CLI is stamped via ldflags (same var the release goreleaser build sets), so a
      # from-source `burrow` reports DEV_VERSION instead of the "dev" fallback the skew gate
      # (ADR-0039) would reject.
      - go install -ldflags "-X main.version={{.DEV_VERSION}}" ./cmd/burrow

  dev-image:
    desc: "DEV (Docker): build+push the burrowd image stamped with DEV_VERSION (needs KO_DOCKER_REPO; pairs with dev-build)"
    cmds:
      # burrowd carries no ldflags stamp (.ko.yaml has none), so — like the release workflow —
      # scripts/dev-image.sh sed-stamps `var version`, ko-builds, and reverts the stamp on exit.
      # KO_DOCKER_REPO (required) and KO_PLATFORM (optional) are read from the environment.
      - bash scripts/dev-image.sh "{{.DEV_VERSION}}"

  # --- heavy targets (start real services / Docker; run deliberately) ---

  test:pg:
    desc: "HEAVY: Postgres integration tests against an ephemeral local Postgres"
    cmds:
      - bash scripts/with-test-postgres.sh go test ./controlplane/postgres/... -v

  test:k3d:
    desc: "HEAVY (Docker): Kubernetes integration test against a disposable k3d cluster"
    cmds:
      - bash scripts/with-k3d.sh go test ./controlplane/kube/ -run TestIntegration -v -timeout 300s

  test:quickstart:
    desc: "HEAVY (Docker): pin docs/QUICKSTART.md's fast path against a disposable k3d cluster"
    cmds:
      - bash test/e2e/quickstart.sh

  test:integration:
    desc: "HEAVY: all integration tests (Postgres + k3d/Docker)"
    cmds:
      - task: test:pg
      - task: test:k3d
